<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animacja zmiany koloru przy hover</title>
    <style>
        div {
            width: 200px;
            height: 200px;
            background-color: rgb(207, 7, 7);
            color: #fff;
            transition: background-color 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        div:hover {
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>Animacja zmiany koloru przy hover</h1>
    <div>
        Najedż kursorem
    </div>
</body>
</html>
