<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktyczne zastosowanie Flexboxa i Grid do tworzenia układów stron</title>
    <style>
        header, footer {
            background-color: #333;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
        }
        main {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1rem;
            padding: 1rem;
        }
        .grid-item {
            background-color: #e7e7e7;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Moja strona</h1>
    </header>
    <main>
        <div class="grid-item">Sekcja 1</div>
        <div class="grid-item">Sekcja 2</div>
        <div class="grid-item">Sekcja 3</div>
        <div class="grid-item">Sekcja 4</div>
    </main>
    <footer>
        <p>Stopka strony</p>
    </footer>
</body>
</html>
