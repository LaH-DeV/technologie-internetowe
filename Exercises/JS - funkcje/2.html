<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadanie 2</title>
</head>
<body>
    <form>
        <label for="liczba1">Liczba 1:</label>
        <input type="number" id="liczba1">
        <label for="liczba2">Liczba 2:</label>
        <input type="number" id="liczba2">
        <button type="button" onclick="sumujLiczbyZFormularza()">Oblicz sumę</button>
    </form>
    <p id="suma"></p>

    <script>
        function sumujLiczbyZFormularza() {
            const liczba1 = document.getElementById("liczba1").valueAsNumber;
            const liczba2 = document.getElementById("liczba2").valueAsNumber;
            const suma = liczba1 + liczba2;
            document.getElementById("suma").textContent = "Suma: " + suma;
            console.log("Suma:", suma);
        }
    </script>
</body>
</html>
