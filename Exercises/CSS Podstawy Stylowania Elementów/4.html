<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karta z treścią</title>
    <style>
        .box {
            border: 1px solid #000;
            width: 300px;
            box-sizing: border-box;
            padding-bottom: 1rem;
        }
        .box p,
        .box h2 {
            padding-inline: 1rem;
        }
    </style>
</head>
<body>
    <h1>Karta z treścią</h1>
    <div class="box">
        <h2>Nagłówek karty</h2>
        <p>To jest przykładowa karta z treścią. Używa modelu pudełka.</p>
    </div>
</body>
</html>
