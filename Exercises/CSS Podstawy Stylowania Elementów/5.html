<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zmiana typu elementu</title>
    <style>
        div, span {
            padding: 0.5rem;
        }
        div {
            display: inline;
            background-color: #888;
        }
        span {
            display: block;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>Zmiana typu elementu</h1>
    <div>
        To jest div, który teraz zachowuje się jak inline.
    </div>
    <span>
        To jest span, który teraz zachowuje się jak block.
    </span>
</body>
</html>
