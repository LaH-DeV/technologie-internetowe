<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylowanie strony</title>
    <style>
        h1 {
            color: blue;
            text-align: center;
        }
        p {
            color: #555;
        }
        button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>
    <h1>Witaj na mojej stronie</h1>
    <p>To jest prosty paragraf.</p>
    <button type="button">Kliknij mnie</button>
</body>
</html>
