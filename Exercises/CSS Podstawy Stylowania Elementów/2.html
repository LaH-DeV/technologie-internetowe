<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylowanie pudełka</title>
    <style>
        .box {
            box-sizing: border-box;
            background-color: rgb(141, 210, 233);
            border: 3px solid #000;
            width: 300px;
            height: 150px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Stylowanie pudełka</h1>
    <div class="box">
        To jest pudełko.
    </div>
</body>
</html>
