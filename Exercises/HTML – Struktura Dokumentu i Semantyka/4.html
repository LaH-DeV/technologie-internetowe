<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela z danymi</title>
</head>
<body>
    <h1>Tabela z danymi</h1>
    <table border="1">
        <thead>
            <tr>
                <th colspan="3">Dane użytkowników</th>
            </tr>
            <tr>
                <th>Imię</th>
                <th>Wiek</th>
                <th>Miasto</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Jan</td>
                <td>25</td>
                <td rowspan="2">Warszawa</td>
            </tr>
            <tr>
                <td>Anna</td>
                <td>30</td>
            </tr>
            <tr>
                <th colspan="2">Łączna liczba osób:</th>
                <td>2</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
