<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularz zamówienia</title>
</head>
<body>
    <h1>Formularz zamówienia</h1>
    <form action="/order" method="post">
        <label for="product">Produkt:</label>
        <select id="product" name="product" required>
            <option value="" disabled>Wybierz</option>
            <option value="laptop">Laptop</option>
            <option value="smartphone">Smartphone</option>
            <option value="tablet">Tablet</option>
        </select><br><br>
        <label for="quantity">Ilość:</label>
        <input type="number" id="quantity" name="quantity" min="1" required><br><br>
        <label for="phone">Numer telefonu (format: +48 123-456-789):</label>
        <input type="tel" id="phone" name="phone" required placeholder="+48 123-456-789" pattern="\+48 \d{3}-\d{3}-\d{3}"><br><br>
        <button type="submit">Zamów</button>
    </form>
</body>
</html>
